<body class="auth-page">

  <!-- ── Navigation ──────────────────────────── -->

    <div class="container">

        <a class="brand" href="/" aria-label="Veldra home">
          <img src="/assets/brand/veldra-logo.png" alt="Veldra">
        </a>
        <div class="navlinks">
          <a href="/">Home</a>
          <a href="/product/">Product</a>
          <a href="/docs/">Docs</a>
          <a href="/about/">About</a>
        </div>
        <div class="nav-actions">
          <div class="lang-toggle">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="zh">中</button>
          </div>
          <a href="/login/" class="btn btn-primary btn-sm">Sign In</a>
        </div>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- ── Main Content ──────────────────────── -->
  <div class="container" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
    <div class="auth-card">
      <h1 style="margin-top: 0;">Reset Password</h1>
      <div class="auth-msg" id="authMsg" style="display: none;"></div>
      <form id="resetForm" style="display: none;">
        <div class="auth-field">
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="auth-field">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>
        <button type="submit" class="auth-btn">Reset Password</button>
      </form>
    </div>
  </div>

  <!-- ── Footer ──────────────────────────────── -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <img src="/assets/brand/veldra-logo.png" alt="Veldra">
          <p>SV2 mining gateway infrastructure for production pool operators.</p>
        </div>
        <div>
          <h4>Product</h4>
          <div class="footer-links">
            <a href="/product/">ReserveGrid OS</a>
            <a href="/product/#architecture">Architecture</a>
          </div>
        </div>

          <a href="/terms/">Terms</a>
          <a href="/disclaimer/">Disclaimer</a>
        </div>
      </div>
    </div>
  </footer>

  <button class="scroll-top" aria-label="Scroll to top">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <script>
  (function() {
    'use strict';

    var msgEl = document.getElementById('authMsg');
    var form = document.getElementById('resetForm');
    var passwordInput = document.getElementById('password');
    var confirmPasswordInput = document.getElementById('confirmPassword');

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'auth-msg ' + type;
      msgEl.style.display = 'block';
    }

    function getQueryParam(name) {
      var url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    var token = getQueryParam('token');
    if (!token) {
      showMsg('No reset token provided. Please use the link from your email.', 'error');
      return;
    }

    form.style.display = 'block';

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var password = passwordInput.value;
      var confirmPassword = confirmPasswordInput.value;

      if (!password || !confirmPassword) {
        showMsg('Please fill in all fields.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMsg('Passwords do not match.', 'error');
        return;
      }

      if (password.length < 8) {
        showMsg('Password must be at least 8 characters long.', 'error');
        return;
      }

      showMsg('Resetting password...', '');

      VeldraAuth.resetPassword(token, password).then(function(result) {
        if (result.ok) {
          showMsg(result.message || 'Password reset successful.', 'success');
          form.style.display = 'none';
          var linkEl = document.createElement('div');
          linkEl.className = 'auth-links';
          linkEl.style.marginTop = '1.5rem';
          linkEl.innerHTML = '<a href="/login/">Return to login</a>';
          msgEl.parentElement.appendChild(linkEl);
        } else {
          showMsg(result.message || 'Reset failed.', 'error');
        }
      }).catch(function(err) {
        showMsg('An error occurred. Please try again.', 'error');
      });
    });
  })();
  </script>
</body>
</html>
